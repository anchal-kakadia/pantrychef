services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pantrychef
      POSTGRES_PASSWORD: pantrychef
      POSTGRES_DB: pantrychef
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data   # data survives container restart

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  postgres_data: